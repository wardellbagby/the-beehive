name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :androidApp:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/androidApp-debug.apk

  build-homebridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: ./gradlew :homebridgePlugin:dist
      - name: Pack npm package
        working-directory: homebridgePlugin
        run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: homebridge-plugin
          path: homebridgePlugin/wardellbagby-homebridge-beehive-plugin-*.tgz

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :server:buildFatJar
      - uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/server-all.jar

  publish-npm:
    runs-on: ubuntu-latest
    needs: build-homebridge
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: ./gradlew :homebridgePlugin:dist
      - name: Publish to NPM
        working-directory: homebridgePlugin
        run: npm publish --access public --provenance

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-homebridge, build-server, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            android-apk/androidApp-debug.apk
            homebridge-plugin/wardellbagby-homebridge-beehive-plugin-*.tgz
            server-jar/server-all.jar
